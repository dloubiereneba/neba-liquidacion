<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NEBA | Liquidación</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0a0a0a;
  --s1:     #141414;
  --s2:     #1e1e1e;
  --s3:     #282828;
  --bd:     #333;
  --bd2:    #444;
  --sv:     #a8b2bc;
  --sv2:    #d0d8e0;
  --wh:     #f0f2f4;
  --mu:     #666;
  --mdo-c:  #7a9ab8;
  --km-c:   #889aaa;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--wh);min-height:100vh;}

/* HEADER */
header{
  background:var(--s1);border-bottom:1px solid var(--bd2);
  padding:0 24px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.logo-wrap{display:flex;align-items:center;gap:11px;}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:800;letter-spacing:3px;color:var(--sv2);}
.logo-sub{font-size:9px;color:var(--mu);letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}

/* STATUS BADGE */
.status{
  display:flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;color:var(--mu);
  background:var(--s2);border:1px solid var(--bd);
  border-radius:20px;padding:5px 12px;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.status-dot.ok{background:#6aaa6a;box-shadow:0 0 6px #6aaa6a88;}
.status-dot.loading{background:#aaaa44;box-shadow:0 0 6px #aaaa4488;}
.status-dot.err{background:#aa4444;box-shadow:0 0 6px #aa444488;}

/* MAIN */
main{padding:22px 24px;max-width:1100px;margin:0 auto;}

.page-title{font-size:20px;font-weight:700;color:var(--sv2);margin-bottom:18px;}
.page-title span{color:var(--sv);}

/* LOADING OVERLAY */
.loading-overlay{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:300px;gap:16px;
}
.spinner{
  width:36px;height:36px;border:3px solid var(--bd2);
  border-top-color:var(--sv);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:13px;color:var(--mu);font-weight:600;}

/* ERROR CARD */
.err-card{
  background:var(--s1);border:1px solid #553333;border-radius:12px;
  padding:24px;text-align:center;
}
.err-card p{font-size:13px;color:#cc8888;line-height:1.6;}
.err-card strong{color:var(--sv2);}

/* META BAR */
.meta-bar{
  display:flex;background:var(--s1);
  border:1px solid var(--bd2);border-radius:10px;
  overflow:hidden;margin-bottom:16px;
}
.meta-field{display:flex;align-items:center;gap:9px;flex:1;padding:10px 14px;}
.meta-field+.meta-field{border-left:1px solid var(--bd);}
.meta-lbl{font-size:9px;font-weight:800;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap;}
.meta-inp{
  background:transparent;border:none;width:100%;
  color:var(--wh);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:500;outline:none;
}
.meta-inp::placeholder{color:#3a3a3a;font-style:italic;font-weight:400;}

/* TABLE WRAP */
.tbl-wrap{
  background:var(--s1);border:1px solid var(--bd2);
  border-radius:12px;overflow-x:auto;
  margin-bottom:14px;-webkit-overflow-scrolling:touch;
}
table{width:100%;border-collapse:collapse;min-width:680px;}
thead{background:var(--s2);}
.th-group{
  padding:7px 8px 4px;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:1.2px;
  border-bottom:1px solid var(--bd);color:var(--mu);
}
.g-mdo{color:var(--mdo-c)!important;border-bottom:2px solid #446688!important;}
.g-km {color:var(--km-c)!important; border-bottom:2px solid #3a5060!important;}
.g-tot{color:var(--sv2)!important;  border-bottom:2px solid var(--sv)!important;}
th.ch{
  padding:5px 7px 9px;font-size:10px;font-weight:700;
  color:var(--mu);text-transform:uppercase;letter-spacing:.6px;
  text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--bd2);
}
th.ch.mdo{color:var(--mdo-c);}
th.ch.km {color:var(--km-c);}
th.ch.tot{color:var(--sv2);}
td{padding:3px 5px;border-bottom:1px solid #1c1c1c;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover{background:rgba(255,255,255,.013);}
.td-n{font-size:11px;color:#404040;font-weight:700;text-align:center;width:34px;}
.td-v{font-size:11px;font-weight:700;text-align:right;padding-right:10px;white-space:nowrap;}
.v-mdo{color:var(--mdo-c);}
.v-km {color:var(--km-c);}
.v-tot{color:var(--sv2);}
td input,td select{
  width:100%;background:transparent;border:1px solid transparent;
  border-radius:4px;padding:5px 6px;color:var(--wh);
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:500;
  outline:none;transition:all .1s;-webkit-appearance:none;
  min-height:34px;
}
td input:focus,td select:focus{background:#1a1a1a;border-color:var(--bd2);}
td select option{background:#1e1e1e;}
td input[type=number]{text-align:center;}

/* TOTALS */
.totals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.tc{background:var(--s1);border:1px solid var(--bd2);border-radius:10px;padding:12px 16px;}
.tc.hi{background:var(--s2);border-color:var(--sv);}
.tc-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:4px;}
.tc-amt{font-size:20px;font-weight:800;color:var(--sv2);}

/* BUTTONS */
.btn-row{display:flex;gap:9px;flex-wrap:wrap;}
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:11px 20px;border-radius:8px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .15s;border:none;
}
.btn-main{background:var(--s3);border:1px solid var(--sv);color:var(--sv2);}
.btn-main:hover{background:var(--bd2);}
.btn-sec{background:transparent;border:1px solid var(--bd2);color:var(--mu);}
.btn-sec:hover{border-color:var(--bd2);color:var(--wh);}
.btn:active{transform:scale(.97);}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;left:24px;
  background:var(--s2);border:1px solid var(--sv);
  border-radius:9px;padding:11px 18px;
  font-size:13px;font-weight:700;color:var(--sv2);
  transform:translateY(90px);opacity:0;transition:all .25s;z-index:999;
  text-align:center;
}
.toast.show{transform:translateY(0);opacity:1;}

/* INSTRUCTIONS CARD */
.info-card{
  background:var(--s1);border:1px solid var(--bd);border-radius:10px;
  padding:14px 18px;margin-bottom:16px;
  font-size:12px;color:var(--mu);line-height:1.7;
}
.info-card strong{color:var(--sv);font-weight:700;}

/* RESPONSIVE — MOBILE */
@media(max-width:600px){
  header{padding:0 14px;height:58px;}
  .logo-name{display:none;}
  main{padding:14px;}
  .page-title{font-size:17px;margin-bottom:14px;}
  .meta-bar{flex-direction:column;}
  .meta-field+.meta-field{border-left:none;border-top:1px solid var(--bd);}
  .totals{grid-template-columns:1fr;}
  .tc-amt{font-size:18px;}
  .btn-row{flex-direction:column;}
  .btn{width:100%;justify-content:center;}
  .toast{left:14px;right:14px;}
  .status span.status-txt{display:none;}
}
@media(min-width:601px) and (max-width:900px){
  main{padding:18px;}
  .totals{grid-template-columns:1fr 1fr;}
}
</style>
</head>

<script>
const ROWS     = 20;
const CONFIG_URL = 'config.json';  // relative — same folder on GitHub Pages

let cfg  = null;
let data = newData();

function newData(){
  return Array.from({length:ROWS},()=>({caso:'',prod:'',int:'',km:''}));
}

// ── LOAD CONFIG FROM SERVER ──────────────────────────────
async function loadConfig(){
  setStatus('loading','Cargando tarifas\u2026');
  try {
    const r = await fetch(CONFIG_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    cfg = await r.json();
    setStatus('ok','Tarifas actualizadas');
    setTimeout(()=>setStatus('ok','En l\u00ednea'),2000);
    renderApp();
  } catch(e) {
    setStatus('err','Error al cargar tarifas');
    showError(e);
  }
}

function setStatus(state, txt){
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-txt');
  dot.className = 'status-dot ' + state;
  lbl.textContent = txt;
}

function showError(e){
  document.getElementById('main-content').innerHTML =
    '<div class="err-card"><p><strong>No se pudieron cargar las tarifas.</strong><br>' +
    'Verific\u00e1 tu conexi\u00f3n e intent\u00e1 recargar la p\u00e1gina.<br><br>' +
    '<small style="color:#666">Detalle: ' + e.message + '</small></p>' +
    '<br><button class="btn btn-main" onclick="location.reload()">Reintentar</button></div>';
}

// ── RENDER APP ───────────────────────────────────────────
function renderApp(){
  const main = document.getElementById('main-content');
  main.innerHTML = APP_HTML;
  renderTable();
}

const APP_HTML = `

// ── TABLE ────────────────────────────────────────────────
function getMdoVal(tipo){
  if(!tipo) return 0;
  const t = cfg.mdo.find(x=>x.tipo===tipo);
  return t ? (t.val||0) : 0;
}

function prodOpts(sel){
  return '<option value="">\u2014</option>' +
    cfg.prods.map(p=>'<option value="'+esc(p)+'"'+(p===sel?' selected':'')+'>'+esc(p)+'</option>').join('');
}

function intOpts(sel){
  return '<option value="">\u2014</option>' +
    cfg.mdo.map(t=>'<option value="'+esc(t.tipo)+'"'+(t.tipo===sel?' selected':'')+'>'+esc(t.tipo)+'</option>').join('');
}

function renderTable(){
  const tb = document.getElementById('tbody');
  if(!tb) return;
  let h='';
  for(let i=0;i<ROWS;i++){
    const r=data[i];
    const vm=getMdoVal(r.int);
    const vk=(parseFloat(r.km)||0)*cfg.kmVal;
    const vt=vm+vk;
    h+='<tr>'+
      '<td class="td-n">'+(i+1)+'</td>'+
      '<td><input type="text" value="'+esc(r.caso)+'" placeholder="N\u00ba caso" oninput="data['+i+'].caso=this.value"></td>'+
      '<td><select onchange="data['+i+'].prod=this.value">'+prodOpts(r.prod)+'</select></td>'+
      '<td><select onchange="data['+i+'].int=this.value;rr('+i+')">'+intOpts(r.int)+'</select></td>'+
      '<td class="td-v v-mdo" id="vm-'+i+'">'+fv(vm)+'</td>'+
      '<td><input type="number" value="'+(r.km||'')+'" placeholder="0" min="0" oninput="data['+i+'].km=this.value;rr('+i+')" style="text-align:center"></td>'+
      '<td class="td-v v-km" id="vk-'+i+'">'+fv(vk)+'</td>'+
      '<td class="td-v v-tot" id="vt-'+i+'">'+fv(vt)+'</td>'+
    '</tr>';
  }
  tb.innerHTML=h;
  calcTotals();
}

function rr(i){
  const r=data[i];
  const vm=getMdoVal(r.int);
  const vk=(parseFloat(r.km)||0)*cfg.kmVal;
  document.getElementById('vm-'+i).textContent=fv(vm);
  document.getElementById('vk-'+i).textContent=fv(vk);
  document.getElementById('vt-'+i).textContent=fv(vm+vk);
  calcTotals();
}

function calcTotals(){
  let tM=0,tK=0;
  data.forEach(r=>{tM+=getMdoVal(r.int);tK+=(parseFloat(r.km)||0)*cfg.kmVal;});
  document.getElementById('t-mdo').textContent='$ '+fmt(tM);
  document.getElementById('t-km').textContent ='$ '+fmt(tK);
  document.getElementById('t-gen').textContent='$ '+fmt(tM+tK);
}

function clearAll(){
  if(!confirm('\u00bfLimpiar todos los datos ingresados?')) return;
  data=newData();
  document.getElementById('inp-service').value='';
  document.getElementById('inp-periodo').value='';
  renderTable();
}

// ── EXCEL EXPORT ─────────────────────────────────────────
function exportExcel(){
  const service = (document.getElementById('inp-service')||{}).value||'';
  const periodo  = (document.getElementById('inp-periodo')||{}).value||'';
  const svc = service.trim();
  const per = periodo.trim();

  const parts=['Liquidacion'];
  if(svc) parts.push(svc.replace(/\s+/g,'_'));
  if(per) parts.push(per.replace(/\s+/g,'_'));
  const fname = parts.join('_')+'.xlsx';

  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([]);

  XLSX.utils.sheet_add_aoa(ws,[
    ['NEBA \u2013 LIQUIDACI\u00d3N DE TRABAJOS POR GARANT\u00cdAS','','','','','','','POSTVENTA'],
    ['SERVICE AUTORIZADO:','','',svc||'\u2014','','','',''],
    ['PERIODO LIQUIDADO:','','',per||'\u2014','','','',''],
    [],
    ['ITEM','N\u00b0 DE CASO','PRODUCTO','INTERVENCI\u00d3N','VALOR MDO ($)','KM EXCEDENTE (I+V)','VALOR KM ($)','TOTAL CASO ($)']
  ],{origin:'A1'});

  const dRows=[];
  data.forEach((r,i)=>{
    const vm=getMdoVal(r.int);
    const km=parseFloat(r.km)||0;
    const vk=km*cfg.kmVal;
    dRows.push([i+1,r.caso||'',r.prod||'',r.int||'',vm||'',km||'',vk||'',(vm+vk)||'']);
  });
  XLSX.utils.sheet_add_aoa(ws,dRows,{origin:'A6'});

  const tMdo=data.reduce((s,r)=>s+getMdoVal(r.int),0);
  const tKm =data.reduce((s,r)=>s+(parseFloat(r.km)||0)*cfg.kmVal,0);
  const tr=6+ROWS+1;
  XLSX.utils.sheet_add_aoa(ws,[
    [],
    ['','','','TOTAL MANO DE OBRA:',tMdo,'','',''],
    ['','','','TOTAL KM EXCEDENTE:','','',tKm,''],
    ['','','','TOTAL GENERAL:','','','',tMdo+tKm]
  ],{origin:'A'+tr});

  ws['!cols']=[{wch:6},{wch:18},{wch:20},{wch:22},{wch:16},{wch:18},{wch:14},{wch:16}];
  if(!ws['!merges']) ws['!merges']=[];
  ws['!merges'].push({s:{r:0,c:0},e:{r:0,c:6}},{s:{r:1,c:3},e:{r:1,c:6}},{s:{r:2,c:3},e:{r:2,c:6}});

  const S={
    title:{font:{name:'Calibri',bold:true,sz:13,color:{rgb:'D0D8E0'}},fill:{fgColor:{rgb:'141414'}},alignment:{vertical:'center'}},
    lbl:  {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'888888'}},fill:{fgColor:{rgb:'1E1E1E'}}},
    val:  {font:{name:'Calibri',sz:10,color:{rgb:'D0D8E0'}},fill:{fgColor:{rgb:'1E1E1E'}}},
    hBase:{font:{name:'Calibri',bold:true,sz:10,color:{rgb:'A8B2BC'}},fill:{fgColor:{rgb:'282828'}},alignment:{horizontal:'center'},border:{bottom:{style:'medium',color:{rgb:'666666'}}}},
    hMdo: {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'7A9AB8'}},fill:{fgColor:{rgb:'282828'}},alignment:{horizontal:'center'},border:{bottom:{style:'medium',color:{rgb:'446688'}}}},
    hKm:  {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'889AAA'}},fill:{fgColor:{rgb:'282828'}},alignment:{horizontal:'center'},border:{bottom:{style:'medium',color:{rgb:'3A5060'}}}},
    hTot: {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'D0D8E0'}},fill:{fgColor:{rgb:'282828'}},alignment:{horizontal:'center'},border:{bottom:{style:'medium',color:{rgb:'A8B2BC'}}}},
    cell: {font:{name:'Calibri',sz:10,color:{rgb:'E0E4E8'}},fill:{fgColor:{rgb:'141414'}},border:{bottom:{style:'thin',color:{rgb:'252525'}}}},
    num:  {font:{name:'Calibri',sz:10,color:{rgb:'444444'}},fill:{fgColor:{rgb:'141414'}},alignment:{horizontal:'center'}},
    vMdo: {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'7A9AB8'}},fill:{fgColor:{rgb:'141414'}},alignment:{horizontal:'right'},numFmt:'"$ "#,##0'},
    vKm:  {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'889AAA'}},fill:{fgColor:{rgb:'141414'}},alignment:{horizontal:'right'},numFmt:'"$ "#,##0'},
    vTot: {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'D0D8E0'}},fill:{fgColor:{rgb:'1E1E1E'}},alignment:{horizontal:'right'},numFmt:'"$ "#,##0'},
    sLbl: {font:{name:'Calibri',bold:true,sz:10,color:{rgb:'888888'}},fill:{fgColor:{rgb:'1E1E1E'}},alignment:{horizontal:'right'}},
    sMdo: {font:{name:'Calibri',bold:true,sz:11,color:{rgb:'7A9AB8'}},fill:{fgColor:{rgb:'1E1E1E'}},numFmt:'"$ "#,##0',alignment:{horizontal:'right'}},
    sKm:  {font:{name:'Calibri',bold:true,sz:11,color:{rgb:'889AAA'}},fill:{fgColor:{rgb:'1E1E1E'}},numFmt:'"$ "#,##0',alignment:{horizontal:'right'}},
    sGen: {font:{name:'Calibri',bold:true,sz:12,color:{rgb:'D0D8E0'}},fill:{fgColor:{rgb:'282828'}},numFmt:'"$ "#,##0',alignment:{horizontal:'right'},border:{top:{style:'medium',color:{rgb:'A8B2BC'}},bottom:{style:'medium',color:{rgb:'A8B2BC'}}}},
  };

  function ss(ref,style){if(!ws[ref])ws[ref]={t:'z',v:''};ws[ref].s=style;}
  const C=['A','B','C','D','E','F','G','H'];
  ss('A1',S.title); ss('H1',{font:{name:'Calibri',bold:true,sz:10,color:{rgb:'666666'}},fill:{fgColor:{rgb:'141414'}},alignment:{horizontal:'right'}});
  ss('A2',S.lbl); ss('D2',S.val); ss('A3',S.lbl); ss('D3',S.val);
  const hStyles=[S.hBase,S.hBase,S.hBase,S.hMdo,S.hMdo,S.hKm,S.hKm,S.hTot];
  C.forEach((c,i)=>ss(c+'5',hStyles[i]));
  for(let i=0;i<ROWS;i++){
    const row=6+i;
    ss('A'+row,S.num); ss('B'+row,S.cell); ss('C'+row,S.cell); ss('D'+row,S.cell);
    ss('E'+row,S.vMdo); ss('F'+row,{...S.cell,alignment:{horizontal:'center'}});
    ss('G'+row,S.vKm); ss('H'+row,S.vTot);
  }
  ss('D'+tr,S.sLbl); ss('E'+tr,S.sMdo);
  ss('D'+(tr+1),S.sLbl); ss('G'+(tr+1),S.sKm);
  ss('D'+(tr+2),S.sLbl); ss('H'+(tr+2),S.sGen);
  ws['!rows']=[{hpt:22},null,null,null,{hpt:18}];

  XLSX.utils.book_append_sheet(wb,ws,'Liquidaci\u00f3n');
  XLSX.writeFile(wb,fname);
  showToast('\u2713 Excel descargado: '+fname);
}

// ── UTILS ────────────────────────────────────────────────
function fmt(n){return(n||0).toLocaleString('es-AR');}
function fv(n){return n>0?'$ '+fmt(n):'\u2014';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

// ── BOOT ─────────────────────────────────────────────────
loadConfig();
</script>
